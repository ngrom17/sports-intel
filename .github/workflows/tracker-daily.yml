name: Tracker Daily Automation

on:
  schedule:
    # All times UTC. NBA season runs Oct–Jun; NHL runs Oct–Jun.
    - cron: '0 16 * * *'    # 11:00 AM ET — Log Today's Picks
    - cron: '30 23 * * *'   # 6:30 PM ET  — Capture Closing Prices
    - cron: '0 6 * * *'     # 1:00 AM ET  — Settle Final Games
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run manually'
        required: true
        type: choice
        options: [log, capture-closing, settle]
      sport:
        description: 'Sport (leave blank to run all)'
        required: false
        default: ''

env:
  BASE: https://sports-intel-api.fly.dev

jobs:
  log-picks:
    name: Log Today's Picks
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'log' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 16')
    runs-on: ubuntu-latest
    steps:
      - name: POST /tracker/log — NBA
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nba'
        run: curl -sf -X POST "${BASE}/api/tracker/log?sport=nba"
      - name: POST /tracker/log — NHL
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nhl'
        run: curl -sf -X POST "${BASE}/api/tracker/log?sport=nhl"

  capture-closing:
    name: Capture Closing Prices
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'capture-closing' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '30 23')
    runs-on: ubuntu-latest
    steps:
      - name: POST /tracker/capture-closing — NBA
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nba'
        run: curl -sf -X POST "${BASE}/api/tracker/capture-closing?sport=nba"
      - name: POST /tracker/capture-closing — NHL
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nhl'
        run: curl -sf -X POST "${BASE}/api/tracker/capture-closing?sport=nhl"

  settle:
    name: Settle Final Games
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'settle' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 6')
    runs-on: ubuntu-latest
    steps:
      - name: POST /tracker/settle — NBA
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nba'
        run: curl -sf -X POST "${BASE}/api/tracker/settle?sport=nba"
      - name: POST /tracker/settle — NHL
        if: github.event.inputs.sport == '' || github.event.inputs.sport == 'nhl'
        run: curl -sf -X POST "${BASE}/api/tracker/settle?sport=nhl"
